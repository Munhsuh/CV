
{% extends "home/base.html" %}

{% block content %}

<h1>Guestbook</h1>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Post Comment</button>
</form>

<hr>

{% for msg in messages %}
    <div style="margin-bottom: 15px;">
        <strong>{{ msg.name }}</strong><br>
        <p>{{ msg.message }}</p>
        <small>{{ msg.created_at }}</small>
    </div>
{% endfor %}

{% endblock %}
