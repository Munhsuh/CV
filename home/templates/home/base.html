
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Resume Website</title>

    <!-- Basic styling (you can move to CSS later) -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #444;
            display: flex;
            justify-content: center;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
        }

        nav a:hover {
            background: #666;
        }

        main {
            padding: 20px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>My Resume Website</h1>
    </header>

    <!-- NAVBAR -->
    <nav>
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a href="/guestbook/">Guestbook</a>
        <a href="/contact/">Contact</a>
    </nav>

    <!-- MAIN CONTENT (DYNAMIC PART) -->
    <main>
        {% block content %}
        {% endblock %}
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 My Resume Site</p>
    </footer>

</body>
</html>
