
<!DOCTYPE html>
<html lang="en">
<head>
    <title>{% block title %}My Resume{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Basic styling (you can move to CSS later) -->
    <style>
       * {
    box-sizing: border-box;
        }

       .container {
            width: 90%;
            max-width: 1000px;
            margin: auto;
        } 
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;

        }

        nav {
            background: #444;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
            display: block;
        }

        nav a:hover {
            background: #666;
        }

        main {
            padding: 20px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            width: 100%;
        }
        @media (max-width: 600px) {

         header h1 {
        font-size: 24px;
        }

         nav {
        flex-direction: column;
        }

        nav a {
        text-align: center;
        }

        main {
        padding: 10px;
       }

        .container {
        width: 95%;
        }

       }
    </style>

   </head>
<body>

    <!-- HEADER -->
    <header>
        <h1>My Resume Website</h1>
    </header>

    <!-- NAVBAR -->
    <nav>
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a href="/guestbook/">Guestbook</a>
        <a href="/contact/">Contact</a>
    </nav>

    <!-- MAIN CONTENT (DYNAMIC PART) -->
    <main>
        <div class="container">

    {% block content %}
    {% endblock %}

</div>
    </main>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 My Resume Site</p>
    </footer>

</body>
</html>
